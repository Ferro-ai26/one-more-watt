<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900" data-status="approved-direction-reference">
 <rect width="1800" height="900" fill="#111718"/><g font-family="Atkinson Hyperlegible,DejaVu Sans,sans-serif"><text x="70" y="70" fill="#F2E8D2" font-size="38" font-weight="700">THE RECURRING PULLBACK — SIX BEATS</text><text x="70" y="108" fill="#B8C3C0" font-size="20">One signature transition, escalating from desk to multiverse. Reduced motion uses labeled still states.</text>
 <g transform="translate(55 150)"><rect width="535" height="285" rx="12" fill="#3C342B" stroke="#D9822B" stroke-width="3"/><rect x="95" y="150" width="350" height="62" fill="#6B4932"/><rect x="220" y="92" width="115" height="80" rx="8" fill="#4B5958"/><rect x="241" y="110" width="73" height="39" rx="5" fill="#102829"/><rect x="254" y="121" width="15" height="16" fill="#58E5EC"/><rect x="286" y="121" width="15" height="16" fill="#58E5EC"/><path d="M335 145 C410 130 430 90 505 105" fill="none" stroke="#24B8C7" stroke-width="8"/><path d="M130 105 l18 -35 18 35 18 -35 18 35" fill="none" stroke="#D9822B" stroke-width="7"/><text x="24" y="35" fill="#F2E8D2" font-size="23" font-weight="700">1 · OVERLOAD</text><text x="24" y="265" fill="#F2E8D2" font-size="17">Fans race. Breakers chatter. Cyan paths saturate.</text></g>
 <g transform="translate(632 150)"><rect width="535" height="285" rx="12" fill="#050707" stroke="#A93640" stroke-width="3"/><rect x="220" y="92" width="115" height="80" rx="8" fill="#151818"/><rect x="241" y="110" width="73" height="39" rx="5" fill="#050707"/><text x="24" y="35" fill="#F2E8D2" font-size="23" font-weight="700">2 · BLACKOUT</text><text x="24" y="265" fill="#F2E8D2" font-size="17">The world goes dark. UI labels remain safe and legible.</text></g>
 <g transform="translate(1209 150)"><rect width="535" height="285" rx="12" fill="#080D0E" stroke="#24B8C7" stroke-width="3"/><rect x="220" y="92" width="115" height="80" rx="8" fill="#2D3737"/><rect x="241" y="110" width="73" height="39" rx="5" fill="#050707"/><rect x="254" y="121" width="15" height="16" fill="#58E5EC"/><rect x="286" y="121" width="15" height="16" fill="#58E5EC"/><circle cx="277" cy="129" r="55" fill="none" stroke="#24B8C7" stroke-opacity=".35" stroke-width="7"/><text x="24" y="35" fill="#F2E8D2" font-size="23" font-weight="700">3 · EYES FIRST</text><text x="24" y="265" fill="#F2E8D2" font-size="17">Two cyan eyes reactivate before everything else.</text></g>
 <g transform="translate(55 475)"><rect width="535" height="285" rx="12" fill="#202829" stroke="#F2E8D2" stroke-width="3"/><rect x="180" y="125" width="175" height="95" fill="#6B4932"/><rect x="242" y="148" width="52" height="38" fill="#4B5958"/><circle cx="255" cy="160" r="5" fill="#58E5EC"/><circle cx="278" cy="160" r="5" fill="#58E5EC"/><path d="M0 245 Q267 10 535 245" fill="none" stroke="#687372" stroke-width="4" stroke-dasharray="14 12"/><path d="M267 42 v70" stroke="#F2E8D2" stroke-width="4"/><path d="M255 95 l12 17 12 -17" fill="none" stroke="#F2E8D2" stroke-width="4"/><text x="24" y="35" fill="#F2E8D2" font-size="23" font-weight="700">4 · CAMERA PULLS BACK</text><text x="24" y="265" fill="#F2E8D2" font-size="17">The former world becomes one tiny operating module.</text></g>
 <g transform="translate(632 475)"><rect width="535" height="285" rx="12" fill="#171D1D" stroke="#D9822B" stroke-width="3"/><g fill="#343E3E" stroke="#5C6866"><rect x="40" y="70" width="100" height="155"/><rect x="155" y="110" width="80" height="115"/><rect x="385" y="92" width="105" height="133"/></g><rect x="250" y="65" width="120" height="160" fill="#4B5958"/><rect x="275" y="92" width="70" height="55" fill="#102829"/><rect x="289" y="109" width="14" height="18" fill="#58E5EC"/><rect x="318" y="109" width="14" height="18" fill="#58E5EC"/><path d="M0 205 C180 160 280 240 535 120" fill="none" stroke="#24B8C7" stroke-width="8"/><text x="24" y="35" fill="#F2E8D2" font-size="23" font-weight="700">5 · LARGER WORLD REVEALED</text><text x="24" y="265" fill="#F2E8D2" font-size="17">A new playable scale arrives with one ordinary remnant.</text></g>
 <g transform="translate(1209 475)"><rect width="535" height="285" rx="12" fill="#F2E8D2" stroke="#24B8C7" stroke-width="4"/><rect x="22" y="22" width="150" height="32" fill="#24B8C7"/><text x="38" y="45" fill="#202829" font-size="16" font-weight="700">NEW REQUEST</text><text x="28" y="92" fill="#202829" font-size="25" font-weight="700">EXPAND CITY COOLING</text><text x="28" y="132" fill="#202829" font-size="20">“That worked perfectly.</text><text x="28" y="161" fill="#202829" font-size="20">Could I have the district?”</text><text x="28" y="200" fill="#A65315" font-size="14" font-weight="700">PAYOFF: CITY RELIABILITY AUTOMATION</text><rect x="28" y="217" width="478" height="17" rx="8" fill="#B8B0A0"/><text x="28" y="263" fill="#566160" font-size="14">6 · OPERATOR AUTHORIZES EXPONENTIALLY MORE</text></g>
 <rect x="55" y="805" width="1689" height="54" rx="8" fill="#252B2C"/><text x="82" y="839" fill="#F2E8D2" font-size="18">CAPTURE STATES: NORMAL · OVERLOAD · BLACKOUT · REBOOT · EXPANDED · REPORT  /  NO RAPID FLASH · NO CAMERA SHAKE</text></g>
</svg>
