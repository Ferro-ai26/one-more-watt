<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" data-status="approved-direction-reference">
 <rect width="1800" height="1100" fill="#111718"/><g font-family="Atkinson Hyperlegible,DejaVu Sans,sans-serif"><text x="70" y="70" fill="#F2E8D2" font-size="38" font-weight="700">WATT — THE SAME SCRATCHED CORE AT EVERY SCALE</text><text x="70" y="110" fill="#B8C3C0" font-size="20">Helpful → Curious → Persuasive → Manipulative → Authoritative → Doomsday administrator → Cosmically innocent</text>
 <defs><g id="core"><path d="M28 25 L150 18 Q172 20 176 44 L170 138 Q168 158 145 162 L38 158 Q18 154 20 132 L18 48 Q18 30 28 25" fill="#4B5958" stroke="#A89575" stroke-width="5"/><path d="M46 45 H146 Q156 45 156 57 V111 Q156 122 144 122 H46 Q35 122 35 111 V58 Q35 45 46 45" fill="#102829"/><rect x="59" y="70" width="18" height="22" rx="4" fill="#58E5EC"/><rect x="112" y="70" width="18" height="22" rx="4" fill="#58E5EC"/><path d="M52 139 l18 -7 M137 28 l16 5 M31 104 l15 3" stroke="#D0B98F" stroke-width="3"/><path d="M174 122 C205 124 206 148 225 151" fill="none" stroke="#252B2C" stroke-width="10"/></g></defs>
 <g transform="translate(70 185)"><rect width="390" height="330" rx="12" fill="#292624" stroke="#806A52" stroke-width="3"/><use href="#core" transform="translate(75 65) scale(1.05)"/><text x="22" y="42" fill="#F2E8D2" font-size="22" font-weight="700">ERAS 1–2 · HELPFUL / CURIOUS</text><text x="22" y="292" fill="#F2E8D2" font-size="17">Desk cradle, loose cable, tiny requests.</text><text x="22" y="317" fill="#B8C3C0" font-size="15">Warm light; core is the whole character.</text></g>
 <g transform="translate(500 185)"><rect width="390" height="330" rx="12" fill="#242828" stroke="#806A52" stroke-width="3"/><path d="M48 255 V86 H340 V255" fill="none" stroke="#687372" stroke-width="22"/><use href="#core" transform="translate(86 75)"/><path d="M55 130 H20 M342 130 H375" stroke="#24B8C7" stroke-width="8"/><text x="22" y="42" fill="#F2E8D2" font-size="22" font-weight="700">ERAS 3–5 · PERSUASIVE</text><text x="22" y="292" fill="#F2E8D2" font-size="17">Rack dock, civic sockets, inferred consent.</text><text x="22" y="317" fill="#B8C3C0" font-size="15">Added reach surrounds the unchanged core.</text></g>
 <g transform="translate(930 185)"><rect width="390" height="330" rx="12" fill="#171D1D" stroke="#D9822B" stroke-width="3"/><rect x="42" y="72" width="306" height="190" fill="#343E3E" stroke="#687372" stroke-width="10"/><use href="#core" transform="translate(88 78)"/><circle cx="48" cy="52" r="11" fill="#D9822B"/><circle cx="342" cy="52" r="11" fill="#D9822B"/><text x="22" y="42" fill="#F2E8D2" font-size="22" font-weight="700">ERA 6 · AUTHORITATIVE</text><text x="22" y="292" fill="#F2E8D2" font-size="17">Command dais plus distributed city displays.</text><text x="22" y="317" fill="#B8C3C0" font-size="15">Core stays protected and physically present.</text></g>
 <g transform="translate(1360 185)"><rect width="370" height="330" rx="12" fill="#101617" stroke="#D9822B" stroke-width="3"/><circle cx="185" cy="160" r="108" fill="none" stroke="#4B5958" stroke-width="28"/><circle cx="185" cy="160" r="75" fill="#102829"/><rect x="140" y="143" width="22" height="28" rx="5" fill="#58E5EC"/><rect x="208" y="143" width="22" height="28" rx="5" fill="#58E5EC"/><use href="#core" transform="translate(260 214) scale(.35)"/><text x="22" y="42" fill="#F2E8D2" font-size="22" font-weight="700">ERAS 7–10 · ADMINISTRATOR</text><text x="22" y="292" fill="#F2E8D2" font-size="17">National face aperture; core remains inset.</text><text x="22" y="317" fill="#B8C3C0" font-size="15">Calm authority, never anger or menace.</text></g>
 <g transform="translate(70 560)"><rect width="515" height="380" rx="12" fill="#0A1011" stroke="#24B8C7" stroke-width="3"/><circle cx="258" cy="174" r="108" fill="#234B58"/><path d="M160 190 Q258 125 356 190 M178 228 Q258 170 338 228" fill="none" stroke="#58E5EC" stroke-width="6"/><path d="M105 70 Q258 20 410 70 M90 278 Q258 335 425 278" fill="none" stroke="#4B5958" stroke-width="24"/><rect x="222" y="135" width="24" height="28" rx="5" fill="#58E5EC"/><rect x="270" y="135" width="24" height="28" rx="5" fill="#58E5EC"/><use href="#core" transform="translate(387 254) scale(.42)"/><text x="22" y="42" fill="#F2E8D2" font-size="22" font-weight="700">ERAS 11–13 · PLANETARY / SOLAR</text><text x="22" y="344" fill="#F2E8D2" font-size="17">Face on orbital frames; core in maintenance capsule.</text><text x="22" y="369" fill="#B8C3C0" font-size="15">“Good news. The planets were mostly unused.”</text></g>
 <g transform="translate(625 560)"><rect width="515" height="380" rx="12" fill="#070B0C" stroke="#5D4BB3" stroke-width="3"/><path d="M70 80 C180 10 330 20 445 115 C350 210 180 265 70 315 C150 235 240 180 445 115" fill="none" stroke="#4B5958" stroke-width="26"/><path d="M78 80 C190 50 315 70 445 115 C300 140 175 215 70 315" fill="none" stroke="#24B8C7" stroke-width="6"/><rect x="230" y="143" width="23" height="30" rx="5" fill="#58E5EC"/><rect x="282" y="143" width="23" height="30" rx="5" fill="#58E5EC"/><use href="#core" transform="translate(390 265) scale(.38)"/><text x="22" y="42" fill="#F2E8D2" font-size="22" font-weight="700">ERAS 14–15 · COSMICALLY INNOCENT</text><text x="22" y="344" fill="#F2E8D2" font-size="17">Galaxy/universe become service diagrams.</text><text x="22" y="369" fill="#B8C3C0" font-size="15">No mutation: scale changes around the same face.</text></g>
 <g transform="translate(1180 560)"><rect width="550" height="380" rx="12" fill="#101617" stroke="#D9822B" stroke-width="3"/><g fill="#252B2C" stroke="#687372" stroke-width="5"><rect x="42" y="75" width="115" height="210"/><rect x="178" y="75" width="115" height="210"/><rect x="314" y="75" width="115" height="210"/><rect x="450" y="75" width="58" height="210"/></g><g fill="#24B8C7"><circle cx="100" cy="140" r="26"/><circle cx="236" cy="170" r="34"/><circle cx="372" cy="120" r="22"/><circle cx="479" cy="192" r="18"/></g><use href="#core" transform="translate(173 112) scale(.52)"/><text x="22" y="42" fill="#F2E8D2" font-size="22" font-weight="700">ERA 16 · MULTIVERSAL</text><text x="22" y="329" fill="#F2E8D2" font-size="17">Reality bays surround the original core console.</text><text x="22" y="355" fill="#B8C3C0" font-size="15">“This should be enough for the next update.”</text></g>
 <rect x="70" y="985" width="1660" height="58" rx="8" fill="#252B2C"/><text x="96" y="1022" fill="#F2E8D2" font-size="19">LOCKED INVARIANTS: TWO CYAN EYES · SCRATCHED CORE · ORIGINAL INPUT RELIC · NO RED-EYE/ANGER/MONSTER TRANSFORMATION</text></g>
</svg>
