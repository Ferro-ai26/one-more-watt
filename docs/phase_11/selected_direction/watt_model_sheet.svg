  <text x="744" y="332" class="ui w650" font-size="25">3. Bolt-heart</text><text x="930" y="324" class="ui w500" font-size="22"><tspan x="930" dy="0">centered below eyes;</tspan><tspan x="930" dy="25">never category-colored</tspan></text>
