  <text x="744" y="216" class="ui w650" font-size="25">1. Face window</text><text x="930" y="208" class="ui w500" font-size="22"><tspan x="930" dy="0">wide dark glass;</tspan><tspan x="930" dy="25">1.55:1 visible ratio</tspan></text>
