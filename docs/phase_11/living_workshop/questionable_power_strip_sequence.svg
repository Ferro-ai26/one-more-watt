      <rect x="45" y="32" width="184" height="99" rx="6" fill="#102829" stroke="#263536" stroke-width="7"/>
      <path d="M76 78q17-18 34 0M162 78q17-18 34 0" fill="none" stroke="#24B8C7" stroke-width="12" stroke-linecap="round"/>
      <rect x="96" y="145" width="82" height="26" rx="4" fill="#172829" stroke="#71807C" stroke-width="2"/><path d="M133 149l-9 12h9l-4 8 17-14h-10l6-6z" fill="#24B8C7"/>
      <circle cx="31" cy="151" r="7" fill="#24B8C7"/><path d="M218 145h28M218 157h28" stroke="#192525" stroke-width="6"/>
      <path d="M46 189v21h-28M230 189v21h30" fill="none" stroke="#252B2C" stroke-width="12"/>
      <path d="M11 103c-35 2-47 22-39 47" fill="none" stroke="#252B2C" stroke-width="16"/>
    </g>
    <g id="strip">
      <path d="M0 16l18-16h182l19 16-19 40H18z" fill="#454F4E" stroke="#252B2C" stroke-width="6"/>
      <g fill="#171D1D"><circle cx="40" cy="29" r="9"/><circle cx="82" cy="29" r="9"/><circle cx="124" cy="29" r="9"/><circle cx="166" cy="29" r="9"/></g>
      <circle cx="198" cy="29" r="8" fill="#A93640"/><path d="M0 30h-32" stroke="#252B2C" stroke-width="13"/>
      <rect x="55" y="53" width="112" height="21" fill="#F7F1E5"/><text x="111" y="68" text-anchor="middle" class="mono b" font-size="13">4 OUTLETS · 1 WARNING</text>
    </g>
  </defs>
  <rect width="1800" height="900" fill="#171D1D"/>
  <text x="42" y="64" class="ui b light" font-size="42">Questionable Power Strip · authored purchase choreography</text>
  <text x="1758" y="60" text-anchor="end" class="mono b" font-size="24" fill="#24B8C7">PLACE → CONNECT → RESPOND</text>

  <!-- panels -->
  <g>
    <rect x="30" y="100" width="560" height="750" rx="14" fill="url(#wall)" stroke="#8B8D84" stroke-width="3"/>
    <rect x="620" y="100" width="560" height="750" rx="14" fill="url(#wall)" stroke="#E5A91B" stroke-width="4"/>
    <rect x="1210" y="100" width="560" height="750" rx="14" fill="url(#wall)" stroke="#2B764C" stroke-width="4"/>
  </g>

  <!-- before -->
  <text x="58" y="148" class="ui b light" font-size="31">1 · BEFORE</text><text x="558" y="146" text-anchor="end" class="mono m muted" font-size="20">desk_front_power_strip</text>
  <ellipse cx="337" cy="396" rx="205" ry="180" fill="url(#cyan)"/><ellipse cx="145" cy="425" rx="155" ry="210" fill="url(#amber)"/>
  <rect x="72" y="580" width="475" height="47" fill="#6B4932" stroke="#30251F" stroke-width="5"/><path d="M100 627v127M510 627v127" stroke="#3D2B22" stroke-width="25"/>
