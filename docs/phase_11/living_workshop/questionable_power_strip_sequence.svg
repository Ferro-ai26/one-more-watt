  <use href="#watt" transform="translate(1440 347) scale(.93)" filter="url(#shadow)"/>
  <use href="#strip" transform="translate(1303 505)" filter="url(#shadow)"/>
  <path d="M1490 534C1535 504 1574 490 1593 459" fill="none" stroke="#252B2C" stroke-width="17"/>
  <path d="M1490 534C1535 504 1574 490 1593 459" fill="none" stroke="#5D4BB3" stroke-width="7" stroke-dasharray="16 10"/>
  <path d="M1508 522l16-8M1542 502l16-8M1572 480l14-10" stroke="#FFF9EC" stroke-width="4"/>
  <circle cx="1593" cy="459" r="12" fill="#2B764C" stroke="#FFF9EC" stroke-width="4"/>
  <path d="M1475 421q18-23 36 0M1561 421q18-23 36 0" fill="none" stroke="#24B8C7" stroke-width="13" stroke-linecap="round"/>
  <path d="M1282 344q31-56 79-9l-32 64-65-24z" fill="#596360" stroke="#252B2C" stroke-width="5"/><path d="M1294 375q20 12 38 3" stroke="#F3B75B" stroke-width="7"/>
  <circle cx="1700" cy="404" r="42" fill="#596360" stroke="#252B2C" stroke-width="6"/><path d="M1700 404c-7-27 17-31 26-13 7 15-9 18-26 13zm0 0c25 10 18 31 0 31-17 0-12-16 0-31zm0 0c-19 20-35 5-25-11 9-14 21-2 25 11z" fill="#9AA8A3"/>
  <rect x="1240" y="780" width="500" height="48" rx="6" fill="#F7F1E5"/><text x="1490" y="812" text-anchor="middle" class="ui b" font-size="24">Status lamp, power flow, fan, and WATT respond.</text>
