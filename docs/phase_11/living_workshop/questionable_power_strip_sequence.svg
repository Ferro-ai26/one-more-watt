<svg data-status="superseded-exploration" xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900" fill="#202829" role="img" aria-labelledby="title desc">
  <title id="title">Questionable Power Strip purchase sequence</title>
  <desc id="desc">Three authored storyboard states show an empty desk-front anchor, a power strip seating and cable tracing toward WATT, and an activated connected result with WATT, lamp, fan, and power flow responding.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#B69B73"/><stop offset="1" stop-color="#594535"/></linearGradient>
    <linearGradient id="steel"><stop stop-color="#687776"/><stop offset="1" stop-color="#2D3737"/></linearGradient>
    <radialGradient id="cyan"><stop stop-color="#48D7DF" stop-opacity=".35"/><stop offset="1" stop-color="#24B8C7" stop-opacity="0"/></radialGradient>
    <radialGradient id="amber"><stop stop-color="#F3B75B" stop-opacity=".5"/><stop offset="1" stop-color="#D98B36" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity=".4"/></filter>
    <style>.ui{font-family:"Atkinson Hyperlegible Next","DejaVu Sans",sans-serif}.mono{font-family:"Atkinson Hyperlegible Mono","DejaVu Sans Mono",monospace}.b{font-weight:700}.m{font-weight:600}.light{fill:#FFF9EC}.muted{fill:#C9D1CC}</style>
