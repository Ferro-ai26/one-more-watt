  <use href="#strip" transform="translate(713 505)" filter="url(#shadow)"/>
  <path d="M900 534C945 504 984 490 1003 459" fill="none" stroke="#252B2C" stroke-width="17"/>
  <path d="M900 534C945 504 984 490 1003 459" fill="none" stroke="#5D4BB3" stroke-width="7" stroke-dasharray="16 10"/>
  <circle cx="1003" cy="459" r="12" fill="#E5A91B" stroke="#FFF9EC" stroke-width="4"/>
  <path d="M745 486v-55M724 454l21-23 21 23" fill="none" stroke="#E5A91B" stroke-width="7"/>
  <rect x="650" y="780" width="500" height="48" rx="6" fill="#F7F1E5"/><text x="900" y="812" text-anchor="middle" class="ui b" font-size="24">Brackets seat; authored cable reaches WATT.</text>

  <!-- activated -->
