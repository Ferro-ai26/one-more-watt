<svg data-status="superseded-exploration" xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280" fill="#202829" role="img" aria-labelledby="title desc">
  <title id="title">Living Workshop demand surge and brownout</title>
  <desc id="desc">The Era 1 room visibly dims, the lamp dies, fan coasts, WATT slumps and points toward a broken Transmission cable while readable critical plates explain recovery and retained progress.</desc>
  <defs>
    <pattern id="critical" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><path d="M0 0v18" stroke="#A93640" stroke-width="7" opacity=".26"/></pattern>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000" flood-opacity=".45"/></filter>
    <style>.ui{font-family:"Atkinson Hyperlegible Next","DejaVu Sans",sans-serif}.mono{font-family:"Atkinson Hyperlegible Mono","DejaVu Sans Mono",monospace}.b{font-weight:700}.m{font-weight:600}.light{fill:#FFF9EC}.muted{fill:#C9D1CC}</style>
  </defs>
  <image href="living_workshop_main.svg" width="720" height="1280"/>
  <!-- environmental failure state only -->
  <rect x="0" y="140" width="720" height="810" fill="#171D1D" opacity=".48"/>
  <ellipse cx="380" cy="500" rx="220" ry="190" fill="#24B8C7" opacity=".07"/>
  <path d="M100 505C96 592 150 603 213 624" fill="none" stroke="#A93640" stroke-width="8" stroke-dasharray="18 18"/>
  <path d="M224 619l18 16-20 15" fill="none" stroke="#FFF9EC" stroke-width="5"/><path d="M248 623l-16 14 18 16" fill="none" stroke="#A93640" stroke-width="6"/>
  <rect x="267" y="382" width="217" height="128" rx="8" fill="#102829"/>
  <path d="M305 448q20-12 40 4M405 452q20-16 40-4" fill="none" stroke="#24B8C7" stroke-opacity=".58" stroke-width="12" stroke-linecap="round"/>
  <rect x="328" y="530" width="95" height="29" rx="4" fill="#172829"/><path d="M371 534l-10 13h10l-5 9 19-16h-11l7-6z" fill="#24B8C7" opacity=".58"/>
  <circle cx="251" cy="538" r="8" fill="#A93640"/>
  <path d="M303 579l-4 24-34 25M462 579l-2 23 24 26" stroke="#252B2C" stroke-width="14"/>
  <path d="M501 454h106" stroke="#A93640" stroke-width="5"/><path d="M501 454l18-12v24z" fill="#A93640"/><rect x="510" y="407" width="150" height="37" rx="4" fill="#A93640"/><text x="585" y="433" text-anchor="middle" class="ui b light" font-size="21">CABLE BOTTLENECK</text>
  <path d="M530 466a24 24 0 0 1 48 0" fill="none" stroke="#8B8D84" stroke-width="4" opacity=".45"/><path d="M554 442v48" stroke="#8B8D84" stroke-width="4" opacity=".45"/>

  <!-- replace the normal request plate with critical state -->
  <rect x="67" y="744" width="586" height="194" rx="8" fill="#F7F1E5" stroke="#A93640" stroke-width="6" filter="url(#shadow)"/>
  <rect x="67" y="744" width="18" height="194" fill="url(#critical)"/>
  <rect x="94" y="766" width="234" height="42" rx="5" fill="#A93640"/><text x="211" y="795" text-anchor="middle" class="ui b light" font-size="25">BROWNOUT · SURGE</text>
  <text x="96" y="846" class="ui b" font-size="35">Basic Arithmetic</text>
  <text x="96" y="882" class="ui m" font-size="27">“The cable is reconsidering its career.”</text>
  <text x="96" y="918" class="ui b" font-size="24" fill="#A93640">4 W REACHING WATT · PROGRESS SLOWED, NEVER LOST</text>

  <!-- critical context shelf -->
  <rect x="0" y="950" width="720" height="220" fill="#252B2C"/>
  <path d="M0 950h720" stroke="#A93640" stroke-width="10"/>
  <text x="30" y="997" class="ui b light" font-size="31">Restore the Transmission path</text>
  <text x="30" y="1033" class="ui m muted" font-size="24">Reserve is supporting WATT. No progress will be lost.</text>
  <rect x="30" y="1055" width="400" height="94" rx="7" fill="#5D4BB3"/>
  <text x="54" y="1094" class="ui b light" font-size="29">Braided cable</text><text x="54" y="1130" class="mono b light" font-size="25">+4 W Transmission · 18 SE</text>
  <rect x="450" y="1055" width="240" height="94" rx="7" fill="#F7F1E5"/><text x="570" y="1111" text-anchor="middle" class="ui b" font-size="29">Build now</text>
</svg>
