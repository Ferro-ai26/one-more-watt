<svg data-status="superseded-exploration" xmlns="http://www.w3.org/2000/svg" width="1800" height="900" viewBox="0 0 1800 900" fill="#202829" role="img" aria-labelledby="title desc">
  <title id="title">Desk to Bedroom Assistant camera pullback</title>
  <desc id="desc">A three-beat transition storyboard pulls from the desk, through the room boundary, to a full bedroom cutaway where the original desk grid remains connected to a generator, window service, cooling, and battery.</desc>
  <defs>
    <linearGradient id="wall"><stop stop-color="#B69B73"/><stop offset="1" stop-color="#5A4434"/></linearGradient>
    <linearGradient id="steel"><stop stop-color="#667574"/><stop offset="1" stop-color="#2D3737"/></linearGradient>
    <radialGradient id="cyan"><stop stop-color="#48D7DF" stop-opacity=".4"/><stop offset="1" stop-color="#24B8C7" stop-opacity="0"/></radialGradient>
    <style>.ui{font-family:"Atkinson Hyperlegible Next","DejaVu Sans",sans-serif}.mono{font-family:"Atkinson Hyperlegible Mono","DejaVu Sans Mono",monospace}.b{font-weight:700}.m{font-weight:600}.light{fill:#FFF9EC}.muted{fill:#C9D1CC}</style>
    <g id="miniWatt"><path d="M8 0h150l18 15v108l-15 17H3l-13-17V18z" fill="url(#steel)" stroke="#252B2C" stroke-width="5"/><rect x="26" y="25" width="126" height="72" rx="5" fill="#102829"/><path d="M47 59q13-15 26 0M105 59q13-15 26 0" fill="none" stroke="#24B8C7" stroke-width="9" stroke-linecap="round"/><rect x="62" y="109" width="55" height="20" rx="3" fill="#172829"/><path d="M86 112l-7 10h7l-3 6 13-11h-7l5-5z" fill="#24B8C7"/><path d="M25 140v16H5M150 140v16h22" stroke="#252B2C" stroke-width="9"/></g>
  </defs>
