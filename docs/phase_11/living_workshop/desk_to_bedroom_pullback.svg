  <rect x="1280" y="748" width="460" height="59" rx="6" fill="#F7F1E5"/><text x="1510" y="773" text-anchor="middle" class="ui b" font-size="25">ERA 02 · Bedroom Assistant</text><text x="1510" y="797" text-anchor="middle" class="ui m" font-size="20">Generator outside. WATT found more electricity.</text>

