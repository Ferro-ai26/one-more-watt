<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280" role="img" aria-labelledby="title desc">
  <title id="title">Candidate A — Soft Circuit Workshop, Main Grid concept</title>
  <desc id="desc">Warm tactile mobile interface with WATT in a rounded old monitor, visible desk equipment, grid vital cards, allocation control, and bottom navigation.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="0" flood-color="#263238" flood-opacity="0.18"/>
    </filter>
    <pattern id="paper" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="3" r="1" fill="#263238" opacity="0.035"/>
      <circle cx="13" cy="11" r="1" fill="#263238" opacity="0.025"/>
    </pattern>
    <style>
      .display { font-family: Fredoka, "DejaVu Sans", sans-serif; font-weight: 700; }
      .body { font-family: "Atkinson Hyperlegible Next", "DejaVu Sans", sans-serif; }
      .mono { font-family: "Atkinson Hyperlegible Mono", "DejaVu Sans Mono", monospace; font-weight: 700; }
      .ink { fill: #263238; }
      .muted { fill: #65706E; }
      .tiny { font-size: 18px; letter-spacing: 1.2px; }
      .small { font-size: 21px; }
      .bodycopy { font-size: 24px; }
      .heading { font-size: 28px; }
    </style>
  </defs>

  <rect width="720" height="1280" fill="#E7D6BB"/>
  <rect width="720" height="1280" fill="url(#paper)"/>

  <!-- top status -->
  <rect x="0" y="0" width="720" height="82" fill="#263238"/>
  <text x="24" y="31" class="display" font-size="17" fill="#FFF8E8" letter-spacing="1.2">ERA 01</text>
  <text x="24" y="60" class="body" font-size="21" fill="#FFF8E8">Cold Boot · Desk</text>
  <text x="360" y="35" text-anchor="middle" class="mono" font-size="27" fill="#FFD166">24 SE</text>
  <text x="360" y="61" text-anchor="middle" class="body" font-size="16" fill="#C9D1CE">stored energy</text>
  <text x="625" y="51" text-anchor="end" class="mono" font-size="24" fill="#FFF8E8">8 W</text>
  <circle cx="676" cy="41" r="24" fill="#FFF8E8"/>
  <path d="M676 28v7M676 47v7M663 41h7M682 41h7M667 32l5 5M680 45l5 5M685 32l-5 5M672 45l-5 5" stroke="#263238" stroke-width="3" stroke-linecap="round"/>

  <!-- focal request card -->
  <rect x="22" y="102" width="676" height="330" rx="34" fill="#263238" opacity="0.16" transform="translate(0 8)"/>
  <rect x="22" y="102" width="676" height="330" rx="34" fill="#FFF8E8" stroke="#263238" stroke-width="4"/>
  <path d="M22 327h676v71a34 34 0 0 1-34 34H56a34 34 0 0 1-34-34z" fill="#E8DDC8"/>

  <!-- desk vignette -->
  <rect x="48" y="128" width="270" height="173" rx="22" fill="#D7C6A9"/>
  <rect x="62" y="261" width="242" height="18" rx="8" fill="#7D5D43"/>
  <path d="M83 279v22M282 279v22" stroke="#7D5D43" stroke-width="12" stroke-linecap="round"/>
  <path d="M78 244c-8-34 8-54 31-61" fill="none" stroke="#6657C8" stroke-width="9" stroke-linecap="round"/>
  <rect x="78" y="180" width="45" height="66" rx="10" fill="#FFF8E8" stroke="#263238" stroke-width="4"/>
  <circle cx="92" cy="202" r="4" fill="#263238"/><circle cx="109" cy="202" r="4" fill="#263238"/>
  <path d="M101 219v16" stroke="#E7A91B" stroke-width="6" stroke-linecap="round"/>
  <rect x="139" y="148" width="134" height="104" rx="20" fill="#437078" stroke="#263238" stroke-width="5"/>
  <rect x="153" y="162" width="106" height="70" rx="12" fill="#263238"/>
  <path d="M174 188q10-15 20 0M218 188q10-15 20 0" fill="none" stroke="#45E8E0" stroke-width="8" stroke-linecap="round"/>
  <path d="M190 212q16 12 32 0" fill="none" stroke="#45E8E0" stroke-width="5" stroke-linecap="round"/>
  <path d="M206 252v13M178 265h56" stroke="#263238" stroke-width="8" stroke-linecap="round"/>
  <circle cx="268" cy="245" r="18" fill="#00A7C4" stroke="#263238" stroke-width="4"/>
  <path d="M271 232l-10 13h9l-4 13 13-17h-9z" fill="#FFF8E8"/>
  <text x="183" y="322" text-anchor="middle" class="display ink" font-size="20">WATT · OLD MONITOR</text>

  <!-- request text -->
  <rect x="338" y="126" width="326" height="40" rx="20" fill="#00A7C4"/>
  <text x="501" y="153" text-anchor="middle" class="display" font-size="20" fill="#FFF8E8">WATT HAS A REQUEST</text>
  <text x="348" y="204" class="body ink bodycopy">
    <tspan x="348" dy="0">“Hello. I am almost</tspan>
    <tspan x="348" dy="31">awake. May I finish</tspan>
    <tspan x="348" dy="31">booting?”</tspan>
  </text>
  <text x="348" y="316" class="display ink heading">Finish Booting</text>
  <text x="348" y="347" class="mono muted tiny">CAPACITY · 3 W PEAK · 25s</text>
  <rect x="348" y="368" width="316" height="18" rx="9" fill="#D1C5B0"/>
  <rect x="348" y="368" width="102" height="18" rx="9" fill="#00A7C4"/>
  <circle cx="450" cy="377" r="13" fill="#FFF8E8" stroke="#263238" stroke-width="3"/>
  <text x="48" y="382" class="display ink" font-size="20">1 OUTLET CONNECTED</text>
  <rect x="461" y="397" width="203" height="54" rx="18" fill="#263238"/>
  <text x="562" y="431" text-anchor="middle" class="display" font-size="21" fill="#FFF8E8">Review request →</text>

  <!-- vital cards -->
  <g filter="url(#shadow)">
    <rect x="22" y="462" width="216" height="148" rx="24" fill="#FFF8E8" stroke="#263238" stroke-width="4"/>
    <rect x="252" y="462" width="216" height="148" rx="24" fill="#FFF8E8" stroke="#6657C8" stroke-width="6"/>
    <rect x="482" y="462" width="216" height="148" rx="24" fill="#FFF8E8" stroke="#263238" stroke-width="4"/>
  </g>
  <circle cx="60" cy="500" r="17" fill="#E7A91B"/><path d="M54 489v14h13v-14M50 503h21v11H50z" fill="#FFF8E8"/>
  <text x="86" y="506" class="display ink small">Generation</text>
  <text x="44" y="557" class="mono ink" font-size="34">5 W</text>
  <text x="44" y="589" class="body muted tiny">PRODUCING</text>
  <path d="M282 487h20l12 13-12 13h-20l-12-13z" fill="#6657C8"/>
  <text x="321" y="506" class="display ink small">Transmission</text>
  <text x="274" y="557" class="mono ink" font-size="34">8 W</text>
  <rect x="273" y="570" width="171" height="26" rx="13" fill="#6657C8"/>
  <text x="358" y="589" text-anchor="middle" class="display" font-size="17" fill="#FFF8E8">◆ LIMITING</text>
  <path d="M521 484h24v11h9v19h-42v-19h9z" fill="#26866E"/>
  <text x="561" y="506" class="display ink small">Reserve</text>
  <text x="504" y="557" class="mono ink" font-size="32">0 / 10</text>
  <text x="504" y="589" class="body muted tiny">READY · ■</text>

  <!-- allocation -->
  <text x="24" y="651" class="display ink" font-size="22">Route the spare power</text>
  <text x="696" y="651" text-anchor="end" class="mono muted" font-size="18">+0.12 SE/s</text>
  <rect x="22" y="670" width="676" height="68" rx="22" fill="#263238"/>
  <rect x="251" y="677" width="218" height="54" rx="17" fill="#FFF8E8"/>
  <text x="130" y="713" text-anchor="middle" class="display" font-size="19" fill="#FFF8E8">Expand Grid</text>
  <text x="360" y="713" text-anchor="middle" class="display ink" font-size="21">Balanced</text>
  <text x="585" y="713" text-anchor="middle" class="display" font-size="19" fill="#FFF8E8">Feed WATT</text>

  <!-- main context panel -->
  <rect x="22" y="762" width="676" height="376" rx="28" fill="#FFF8E8" stroke="#263238" stroke-width="4"/>
  <rect x="22" y="762" width="676" height="58" rx="28" fill="#263238"/>
  <path d="M22 792h676v28H22z" fill="#263238"/>
  <text x="48" y="800" class="display" font-size="22" fill="#FFF8E8">DESK GRID</text>
  <text x="672" y="800" text-anchor="end" class="mono" font-size="17" fill="#FFD166">LIVE · 8 W</text>
  <text x="50" y="860" class="display ink" font-size="25">Best next move</text>
  <rect x="48" y="882" width="624" height="92" rx="20" fill="#E8DDC8"/>
  <path d="M77 928h74" stroke="#6657C8" stroke-width="10" stroke-linecap="round"/>
  <circle cx="77" cy="928" r="17" fill="#E7A91B" stroke="#263238" stroke-width="3"/>
  <circle cx="151" cy="928" r="17" fill="#00A7C4" stroke="#263238" stroke-width="3"/>
  <text x="181" y="920" class="body ink" font-size="22">Add Transmission so every generated</text>
  <text x="181" y="949" class="body ink" font-size="22">watt can reach WATT.</text>
  <rect x="48" y="996" width="400" height="110" rx="22" fill="#E7A91B" stroke="#263238" stroke-width="4"/>
  <text x="74" y="1035" class="display ink" font-size="25">Braided cable</text>
  <text x="74" y="1071" class="mono ink" font-size="22">+4 W TRANS. · 18 SE</text>
  <circle cx="504" cy="1051" r="41" fill="#00A7C4" stroke="#263238" stroke-width="4"/>
  <path d="M486 1051h36M512 1037l14 14-14 14" stroke="#FFF8E8" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="563" y="1045" class="display ink" font-size="21">VISIBLE</text>
  <text x="563" y="1073" class="body muted" font-size="18">cable appears</text>

  <!-- bottom nav -->
  <rect x="0" y="1160" width="720" height="120" fill="#263238"/>
  <rect x="18" y="1174" width="159" height="82" rx="22" fill="#FFF8E8"/>
  <text x="98" y="1210" text-anchor="middle" class="display ink" font-size="20">● Grid</text>
  <text x="98" y="1238" text-anchor="middle" class="body muted" font-size="15">live desk</text>
  <text x="269" y="1228" text-anchor="middle" class="display" font-size="20" fill="#FFF8E8">Build</text>
  <text x="450" y="1228" text-anchor="middle" class="display" font-size="20" fill="#FFF8E8">Upgrades</text>
  <text x="625" y="1228" text-anchor="middle" class="display" font-size="20" fill="#FFF8E8">Reports</text>

  <rect x="530" y="110" width="142" height="30" rx="15" fill="#E7A91B" stroke="#263238" stroke-width="3"/>
  <text x="601" y="131" text-anchor="middle" class="display ink" font-size="15">CANDIDATE A</text>
</svg>
