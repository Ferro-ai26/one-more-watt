<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280" role="img" aria-labelledby="title desc">
  <title id="title">Candidate C — Midnight Appliance Theatre, Main Grid concept</title>
  <desc id="desc">Deep plum theatrical mobile interface with WATT as a luminous cyan core on a desk-stage, cream dialogue caption, bold vital blocks, and glowing power paths.</desc>
  <defs>
    <radialGradient id="stageGlow" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#4A386F"/>
      <stop offset="0.55" stop-color="#272044"/>
      <stop offset="1" stop-color="#17122A"/>
    </radialGradient>
    <radialGradient id="wattGlow">
      <stop offset="0" stop-color="#FFF5E8"/>
      <stop offset="0.28" stop-color="#45E8E0"/>
      <stop offset="1" stop-color="#45E8E0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="curtain" x1="0" x2="1">
      <stop offset="0" stop-color="#372752"/>
      <stop offset="0.5" stop-color="#17122A"/>
      <stop offset="1" stop-color="#372752"/>
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#0C0817" flood-opacity="0.45"/>
    </filter>
    <style>
      .display { font-family: "Space Grotesk", "DejaVu Sans", sans-serif; font-weight: 700; }
      .body { font-family: "Space Grotesk", "DejaVu Sans", sans-serif; }
      .mono { font-family: "Space Mono", "DejaVu Sans Mono", monospace; font-weight: 700; }
      .cream { fill: #FFF5E8; }
      .dark { fill: #17122A; }
      .muted { fill: #BEB5D2; }
      .tiny { font-size: 17px; letter-spacing: 1px; }
      .small { font-size: 21px; }
      .bodycopy { font-size: 25px; }
    </style>
  </defs>

  <rect width="720" height="1280" fill="#17122A"/>
  <rect width="720" height="1280" fill="url(#stageGlow)"/>
  <path d="M0 0h118l-34 1140H0zM720 0H602l34 1140h84z" fill="url(#curtain)" opacity="0.8"/>

  <!-- status ribbon -->
  <path d="M0 0H720V82H0z" fill="#17122A"/>
  <path d="M18 81h684" stroke="#45E8E0" stroke-width="2" opacity="0.55"/>
  <text x="24" y="32" class="display" font-size="18" fill="#45E8E0">ERA 01 · COLD BOOT</text>
  <text x="24" y="61" class="body cream" font-size="20">Tonight: the desk learns to think</text>
  <text x="374" y="49" text-anchor="middle" class="mono" font-size="27" fill="#FFD166">24 SE</text>
  <text x="630" y="49" text-anchor="end" class="mono cream" font-size="23">8 W</text>
  <circle cx="675" cy="41" r="23" fill="#272044" stroke="#45E8E0" stroke-width="2"/>
  <circle cx="675" cy="41" r="4" fill="#45E8E0"/><path d="M675 25v7M675 50v7M659 41h7M684 41h7" stroke="#FFF5E8" stroke-width="3"/>

  <!-- theatrical focal stage -->
  <rect x="20" y="104" width="680" height="366" rx="38" fill="#272044" stroke="#4F416C" stroke-width="3" filter="url(#softShadow)"/>
  <path d="M44 333q96-84 191-25t198 2q107-47 241 24v103H44z" fill="#17122A" opacity="0.75"/>
  <path d="M55 370C165 320 225 409 332 354S514 320 661 378" fill="none" stroke="#45E8E0" stroke-width="7" stroke-linecap="round" stroke-dasharray="2 20" opacity="0.65"/>

  <!-- desk props -->
  <path d="M74 360h260v25H74z" fill="#6D4F72"/>
  <path d="M101 385v41M307 385v41" stroke="#6D4F72" stroke-width="14" stroke-linecap="round"/>
  <rect x="85" y="294" width="63" height="67" rx="14" fill="#FFF5E8"/>
  <circle cx="106" cy="320" r="6" fill="#17122A"/><circle cx="128" cy="320" r="6" fill="#17122A"/>
  <path d="M117 339v16" stroke="#FFD166" stroke-width="7" stroke-linecap="round"/>
  <path d="M148 335c34-17 52-1 64 15" fill="none" stroke="#B58CFF" stroke-width="10" stroke-linecap="round"/>
  <rect x="265" y="310" width="51" height="52" rx="12" fill="#56D69B"/>
  <rect x="276" y="322" width="29" height="27" rx="7" fill="#17122A" opacity="0.55"/>

  <!-- WATT luminous core -->
  <circle cx="211" cy="238" r="117" fill="url(#wattGlow)" opacity="0.28"/>
  <ellipse cx="211" cy="246" rx="92" ry="105" fill="none" stroke="#45E8E0" stroke-width="5" stroke-dasharray="53 14" transform="rotate(-14 211 246)" opacity="0.85"/>
  <ellipse cx="211" cy="246" rx="69" ry="92" fill="none" stroke="#FF7A8A" stroke-width="3" transform="rotate(18 211 246)" opacity="0.7"/>
  <circle cx="211" cy="245" r="64" fill="#17122A" stroke="#45E8E0" stroke-width="5" filter="url(#glow)"/>
  <path d="M177 228q15-17 30 0M219 228q15-17 30 0" fill="none" stroke="#45E8E0" stroke-width="10" stroke-linecap="round"/>
  <path d="M192 267q19 17 38 0" fill="none" stroke="#45E8E0" stroke-width="6" stroke-linecap="round"/>
  <path d="M212 233l-17 25h17l-8 27 29-39h-17l10-13z" fill="#FFD166"/>
  <path d="M211 141V117" stroke="#45E8E0" stroke-width="5"/><circle cx="211" cy="109" r="8" fill="#45E8E0"/>
  <rect x="118" y="407" width="188" height="35" rx="17" fill="#17122A" stroke="#45E8E0" stroke-width="2"/>
  <text x="212" y="431" text-anchor="middle" class="display" font-size="17" fill="#45E8E0">WATT · HOUSE LIGHT</text>

  <!-- dialogue caption -->
  <path d="M336 132H671V346H371l-35 32z" fill="#FFF5E8"/>
  <rect x="516" y="146" width="137" height="30" rx="15" fill="#FFD166"/>
  <text x="584" y="167" text-anchor="middle" class="display dark" font-size="15">CANDIDATE C</text>
  <text x="366" y="194" class="body dark bodycopy">
    <tspan x="366" dy="0">“Hello. I am almost</tspan>
    <tspan x="366" dy="33">awake. May I finish</tspan>
    <tspan x="366" dy="33">booting?”</tspan>
  </text>
  <text x="366" y="307" class="display dark" font-size="29">Finish Booting</text>
  <text x="366" y="335" class="mono" font-size="15" fill="#77708F">3 W PEAK · ABOUT 25s</text>
  <rect x="363" y="394" width="308" height="49" rx="24" fill="#45E8E0"/>
  <text x="517" y="426" text-anchor="middle" class="display dark" font-size="21">Review WATT’s request →</text>

  <!-- vitals as stage cards -->
  <text x="24" y="512" class="display cream" font-size="22">The grid, at a glance</text>
  <g filter="url(#softShadow)">
    <path d="M22 532h216v147H42l-20-20z" fill="#4B3A25" stroke="#FFD166" stroke-width="3"/>
    <path d="M252 532h216v147H252z" fill="#3A2D5B" stroke="#B58CFF" stroke-width="5"/>
    <path d="M482 532h216v127l-20 20H482z" fill="#243F3B" stroke="#56D69B" stroke-width="3"/>
  </g>
  <circle cx="56" cy="570" r="17" fill="#FFD166"/><path d="M49 559v15h15v-15M46 574h21v10H46z" fill="#17122A"/>
  <text x="83" y="578" class="display cream" font-size="18">Generation</text>
  <text x="43" y="628" class="mono" font-size="34" fill="#FFD166">5 W</text>
  <text x="43" y="658" class="body muted" font-size="17">steady · ●</text>
  <path d="M278 555h32l14 15-14 15h-32l-14-15z" fill="#B58CFF"/>
  <text x="337" y="578" class="display cream" font-size="18">Transmission</text>
  <text x="273" y="628" class="mono" font-size="34" fill="#B58CFF">8 W</text>
  <rect x="273" y="641" width="170" height="26" rx="13" fill="#FF5D73"/>
  <text x="358" y="660" text-anchor="middle" class="display dark" font-size="16">◆ LIMITING</text>
  <path d="M510 553h26v11h9v23h-44v-23h9z" fill="#56D69B"/>
  <text x="558" y="578" class="display cream" font-size="18">Reserve</text>
  <text x="503" y="628" class="mono" font-size="31" fill="#56D69B">0 / 10</text>
  <text x="503" y="658" class="body muted" font-size="17">ready · ■</text>

  <!-- route control -->
  <rect x="22" y="707" width="676" height="85" rx="27" fill="#17122A" stroke="#4F416C" stroke-width="3"/>
  <rect x="248" y="716" width="224" height="67" rx="23" fill="#FFF5E8"/>
  <text x="130" y="758" text-anchor="middle" class="display muted" font-size="18">Expand Grid</text>
  <text x="360" y="758" text-anchor="middle" class="display dark" font-size="22">Balanced</text>
  <text x="586" y="758" text-anchor="middle" class="display muted" font-size="18">Feed WATT</text>

  <!-- environment / recommended action -->
  <rect x="22" y="818" width="676" height="319" rx="36" fill="#272044" stroke="#4F416C" stroke-width="3"/>
  <path d="M22 902c112-58 205 64 338 8s229-9 338 42v185H22z" fill="#17122A" opacity="0.73"/>
  <text x="48" y="860" class="display cream" font-size="24">Next on the desk</text>
  <text x="671" y="860" text-anchor="end" class="mono" font-size="16" fill="#45E8E0">+0.12 SE/s</text>
  <path d="M75 968C165 910 228 1042 323 968S474 936 551 993" fill="none" stroke="#B58CFF" stroke-width="8" stroke-linecap="round"/>
  <circle cx="75" cy="968" r="30" fill="#FFD166"/>
  <path d="M61 968h28M75 954v28" stroke="#17122A" stroke-width="5"/>
  <circle cx="323" cy="968" r="37" fill="#FF5D73"/>
  <path d="M305 968h36M323 950v36" stroke="#17122A" stroke-width="6"/>
  <circle cx="551" cy="993" r="31" fill="#45E8E0"/>
  <path d="M537 993h28M551 979v28" stroke="#17122A" stroke-width="5"/>
  <rect x="47" y="1040" width="626" height="69" rx="22" fill="#FFF5E8"/>
  <text x="73" y="1069" class="display dark" font-size="22">Add a braided cable</text>
  <text x="73" y="1095" class="body" font-size="18" fill="#77708F">Every generated watt can reach WATT · 18 SE</text>
  <circle cx="630" cy="1075" r="23" fill="#B58CFF"/>
  <path d="M619 1075h22M633 1066l9 9-9 9" fill="none" stroke="#17122A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- footlight navigation -->
  <rect x="0" y="1160" width="720" height="120" fill="#17122A"/>
  <path d="M16 1163h688" stroke="#45E8E0" stroke-width="3" filter="url(#glow)"/>
  <rect x="19" y="1177" width="158" height="72" rx="26" fill="#45E8E0"/>
  <text x="98" y="1220" text-anchor="middle" class="display dark" font-size="21">● Grid</text>
  <text x="270" y="1220" text-anchor="middle" class="display cream" font-size="20">Build</text>
  <text x="451" y="1220" text-anchor="middle" class="display cream" font-size="20">Upgrades</text>
  <text x="625" y="1220" text-anchor="middle" class="display cream" font-size="20">Reports</text>
</svg>
